<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportsAlert</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }

        .navbar-brand {
            font-weight: bold;
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">

        <a class="navbar-brand" href="{% url 'dashboard' %}">
            SportsAlert
        </a>

        <div class="navbar-nav">

            <a class="nav-link"
               href="{% url 'dashboard' %}">
                Dashboard
            </a>

            <a class="nav-link"
               href="{% url 'watch-list' %}">
                Watches
            </a>

            <a class="nav-link"
               href="{% url 'watch-create' %}">
                Create Watch
            </a>

            <a class="nav-link"
               href="{% url 'alert-list' %}">
                Alerts
            </a>

            <a class="nav-link"
               href="{% url 'live-monitor' %}">
                Live Monitor
            </a>

        </div>

    </div>
</nav>

<div class="container">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
